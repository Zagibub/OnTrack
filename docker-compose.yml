services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ontrack}
      POSTGRES_USER: ${POSTGRES_USER:-ontrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ontrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      APP_VERSION: ${APP_VERSION:-dev}
      DATABASE_URL: postgres://${POSTGRES_USER:-ontrack}:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/${POSTGRES_DB:-ontrack}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

  # Cloudflare Tunnel for ontrack.eremann.de — only starts with the "tunnel" profile:
  #   docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - web

volumes:
  pgdata:
