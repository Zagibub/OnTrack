<div class="mx-auto flex min-h-dvh max-w-md flex-col p-6" *transloco="let t">
  <header class="flex justify-end">
    <ot-theme-toggle />
  </header>

  <main class="flex flex-1 flex-col items-center justify-center text-center">
    <img src="icon.svg" alt="OnTrack logo" class="mb-4 h-20 w-20" />
    <h1 class="text-3xl font-bold">OnTrack</h1>
    <p class="mt-1 text-ink-muted">{{ t("onboarding.tagline") }}</p>

    <ul class="mt-8 space-y-3 text-left">
      <li class="flex items-center gap-3">
        <ot-chevron [size]="18" class="shrink-0 text-primary" />
        <span>{{ t("onboarding.feature1") }}</span>
      </li>
      <li class="flex items-center gap-3">
        <ot-chevron [size]="18" class="shrink-0 text-primary" />
        <span>{{ t("onboarding.feature2") }}</span>
      </li>
      <li class="flex items-center gap-3">
        <ot-chevron [size]="18" class="shrink-0 text-primary" />
        <span>{{ t("onboarding.feature3") }}</span>
      </li>
    </ul>
  </main>

  <footer class="mt-8">
    <ot-button (click)="start()">{{ t("onboarding.cta") }}</ot-button>
  </footer>
</div>
