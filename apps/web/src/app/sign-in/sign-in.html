<div class="mx-auto flex min-h-dvh max-w-md flex-col p-6" *transloco="let t">
  <header class="flex justify-end">
    <ot-theme-toggle />
  </header>

  <main class="flex flex-1 flex-col justify-center">
    <img src="icon.svg" alt="OnTrack logo" class="mx-auto mb-4 h-16 w-16" />

    @if (state() === "sent") {
      <div class="text-center" data-testid="sent-state">
        <h1 class="text-2xl font-bold">{{ t("signIn.sentTitle") }}</h1>
        <p class="mt-2 text-ink-muted">{{ t("signIn.sentBody", { email: model().email }) }}</p>
        <button type="button" (click)="reset()" class="mt-6 text-sm text-ink-muted underline">
          {{ t("signIn.useDifferent") }}
        </button>
      </div>
    } @else {
      <h1 class="text-center text-2xl font-bold">{{ t("signIn.title") }}</h1>
      <p class="mt-1 text-center text-ink-muted">{{ t("signIn.subtitle") }}</p>

      <form class="mt-8 space-y-3" (submit)="$event.preventDefault(); submit()">
        <ot-text-field
          [label]="t('signIn.emailLabel')"
          [placeholder]="t('signIn.emailPlaceholder')"
          [error]="error()"
          [formField]="f.email"
        />
        <ot-button type="submit" [disabled]="state() === 'sending'">
          {{ state() === "sending" ? t("signIn.sending") : t("signIn.submit") }}
        </ot-button>
      </form>
    }
  </main>
</div>
